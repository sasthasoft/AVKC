<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      padding: 20px;
      color: #333;
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 20px;
      animation: fadeIn 1s ease-in-out;
      color: #e63b60;
    }

    #loadingMessage {
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #666;
      animation: pulse 1s infinite;
      margin-bottom: 15px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .container-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      animation: fadeIn 1s ease-in;
    }

    .card {
      background: #fff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 300px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: slideUp 0.6s ease forwards;
      opacity: 0;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #e63b60;
      margin-bottom: 10px;
    }

    .message {
      font-size: 1rem;
      color: #555;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
      from {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <h2>New Messages</h2>
  <div id="loadingMessage">Loading... Please wait</div>
  <div class="container-wrapper" id="cardsContainer"></div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxykb_6KG31YSdX1q-Ompm2kgffs_ekzuLhCt5l8sb8yU--XBNJ1v12ZQqRFhK9FtjfmA/exec';

    async function fetchData() {
      try {
        const response = await fetch(`${scriptURL}?action=read`);
        let data = await response.json();

        // Reverse data so the latest (bottom row) appears first
        data.reverse();

        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        data.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.animationDelay = `${index * 0.1}s`;
          card.innerHTML = `
            <div class="name">${item.name}</div>
            <div class="message">${item.message}</div>
          `;
          container.appendChild(card);
        });
      } catch (error) {
        alert('Error loading data: ' + error);
      } finally {
        document.getElementById('loadingMessage').style.display = 'none';
      }
    }

    window.addEventListener('DOMContentLoaded', fetchData);
  </script>

</body>
</html>
