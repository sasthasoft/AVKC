<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Rent Payment Report</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;}
.container{max-width:1200px;margin:auto;padding:10px;}
h2,h3{text-align:center;color:#c2185b;margin:5px 0;}
.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:15px;}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:end;}
label{font-size:12px;font-weight:bold;}
select,input{width:100%;padding:9px;border:1px solid #ccc;border-radius:6px;}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#c2185b;color:#fff;font-weight:bold;cursor:pointer;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:900px;font-size:12px;margin-top:10px;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
th{background:#f06292;color:#fff;}
#loading{text-align:center;color:#c2185b;font-weight:bold;margin:10px;}
</style>
</head>

<body>
<div class="container">
<h2>Transaction Id Report</h2>

<div class="card">
<div class="row">

<div>
<label>Transaction ID</label>
<select id="filterTransaction">
<option value="">All Transactions</option>
<option value="மெயின் ரோடு, கடைகள் வாடகை ரசீது">மெயின் ரோடு</option>
<option value="தெற்கு பஜார், கடைகள் வாடகை ரசீது">தெற்கு பஜார்</option>
<option value="அன்னதானசத்திரம், கடைகள் வாடகை ரசீது">அன்னதானசத்திரம்</option>
<option value="கதிரேசன் கோவில் ரோடு, கடைகள் வாடகை ரசீது">கதிரேசன் கோவில் ரோடு</option>
</select>
</div>

<div>
<label>Payment Date</label>
<input type="date" id="filterDate">
</div>

<div>
<button onclick="searchByTransaction()">🔍 Search</button>
</div>

</div>
</div>

<div id="loading">Loading data...</div>

<div class="card" id="filteredResultsCard" style="display:none;">
<h3>Search Results</h3>
<div class="table-wrap">
<table id="filteredTable">
<thead></thead>
<tbody></tbody>
</table>
</div>
      <br>
      <button type="button" onclick="printReport()">🖨 Print Report</button>

</div>

<div class="card" id="allTableCard">
<h3>All Payments</h3>
<div class="table-wrap">
<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>
</div>
<br>
<button type="button" onclick="printReport()">🖨 Print Report</button>
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyogWMiTNNixoMp7E0NEA7-z_y0Syxxrp_NrG8hWhI7bpPRNokcNAKYo1EyZxxx6qnldA/exec";

let allPayments=[];

/* ===== REQUIRED COLUMNS ONLY ===== */
const allowedColumns=[
"Bill_No",
"PaymentDate",
"Transaction_Id",
"Tenant Name",
"Mobile",
"Shop_No",
"Months",
"Rental_Per_Month",
"Gross_Amount",
"Discount",
"Tax_Percentage",
"Tax_Amount",
"Net_Amount",
"Now_Paid",
"Pending",
"Remarks"
];

/* ===== DATE FORMAT FUNCTION ===== */
function formatDateDDMMMYYYY(dateStr){
if(!dateStr) return "";
const d = new Date(dateStr);
if(isNaN(d)) return dateStr;
const day = String(d.getDate()).padStart(2,'0');
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
return `${day}-${months[d.getMonth()]}-${d.getFullYear()}`;
}

/* ===== LOAD DATA ===== */
async function loadPayments(){
document.getElementById("loading").style.display="block";
try{
const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"getPayments"})
});
const data=await res.json();
allPayments=data.data||[];
document.getElementById("loading").style.display="none";
renderTable(allPayments,"dataTable");
}catch(e){
document.getElementById("loading").innerText="Failed to load!";
}
}

/* ===== RENDER TABLE (ONLY ALLOWED COLUMNS) ===== */
function renderTable(payments,tableId){

const table=document.getElementById(tableId);
const h=table.querySelector("thead");
const b=table.querySelector("tbody");

h.innerHTML=b.innerHTML="";

if(!payments.length){
b.innerHTML=`<tr><td colspan="${allowedColumns.length}">No Data</td></tr>`;
return;
}

/* Header */
h.innerHTML="<tr>"+allowedColumns.map(col=>`<th>${col}</th>`).join("")+"</tr>";

/* Body */
b.innerHTML=payments.map(row=>"<tr>"+

allowedColumns.map(col=>{
let value=row[col]||"";

if(col==="PaymentDate"){
value=formatDateDDMMMYYYY(value);
}

return `<td>${value}</td>`;
}).join("")

+"</tr>").join("");
}

/* ===== FILTER ===== */
function searchByTransaction(){

const tId=document.getElementById("filterTransaction").value.trim();
const fDate=document.getElementById("filterDate").value;

if(!allPayments.length){
alert("Data not loaded yet!");
return;
}

let filtered=allPayments;

/* Transaction Filter */
if(tId){
filtered=filtered.filter(row=>
(row["Transaction_Id"]||"").toString().trim()===tId
);
}

/* Date Filter */
if(fDate){
filtered=filtered.filter(row=>
(row["PaymentDate"]||"").toString().split("T")[0]===fDate
);
}

if(!filtered.length){
alert("No records found!");
return;
}

document.getElementById("filteredResultsCard").style.display="block";
document.getElementById("allTableCard").style.display="none";

renderTable(filtered,"filteredTable");
}

/* ===== PRINT ===== */
function printReport(){

const filteredVisible=document.getElementById("filteredResultsCard").style.display==="block";

const dataToPrint=filteredVisible
?document.querySelectorAll("#filteredTable tbody tr")
:document.querySelectorAll("#dataTable tbody tr");

if(!dataToPrint.length){
alert("No data to print!");
return;
}

let totalNowPaid=0;
let totalPending=0;

let newTable="<table><thead><tr>";
allowedColumns.forEach(col=>{ newTable+=`<th>${col}</th>`; });
newTable+="</tr></thead><tbody>";

dataToPrint.forEach(row=>{
const cells=row.querySelectorAll("td");
newTable+="<tr>";

cells.forEach((cell,i)=>{
let value=cell.innerText;

if(allowedColumns[i]==="Now_Paid"){
totalNowPaid+=parseFloat(value)||0;
}
if(allowedColumns[i]==="Pending"){
totalPending+=parseFloat(value)||0;
}

newTable+=`<td>${value}</td>`;
});

newTable+="</tr>";
});

newTable+=`
<tr style="font-weight:bold;background:#f2f2f2;">
<td colspan="13" style="text-align:right;">TOTAL</td>
<td>${totalNowPaid.toFixed(2)}</td>
<td>${totalPending.toFixed(2)}</td>
<td></td>
</tr>
`;

newTable+="</tbody></table>";

const dtStr=formatDateDDMMMYYYY(new Date());

const previewWindow=window.open("","_blank");

previewWindow.document.write(`
<html>
<head>
<title>Print Preview</title>
<style>
body{font-family:Arial;margin:20px;}
.preview-container{width:210mm;margin:auto;padding:10mm;background:white;}
h2,h3{text-align:center;margin:5px 0;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{border:1px solid #000;padding:4px;font-size:9px;text-align:center;word-break:break-word;}
th{background:#f06292;color:#fff;}
.print-btn{margin:20px auto;display:block;padding:10px 20px;background:#c2185b;color:white;border:none;border-radius:6px;cursor:pointer;}
@media print{
.print-btn{display:none;}
@page{size:A4 landscape;margin:8mm;}
}
</style>
</head>
<body>
<div class="preview-container">
<h2>AVKC சங்கம் - கோவில்பட்டி</h2>
<h3>Transaction Report</h3>
<h3>Date: ${dtStr}</h3>
${newTable}
</div>
<button class="print-btn" onclick="window.print()">🖨 Print Now</button>
</body>
</html>
`);

previewWindow.document.close();
}

loadPayments();

</script>
</body>
</html>
