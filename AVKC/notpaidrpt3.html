<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:#f4f6f8;}
.container{max-width:1300px;margin:auto;padding:10px;}

h2{text-align:center;color:#c2185b;margin:10px 0;}

.card{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:15px;
}

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.summary{
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.1);
background:#fff;
}

.green{color:green;}
.red{color:red;}
.blue{color:#1976d2;}

button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#c2185b;
color:#fff;
margin:5px;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

/* TABLE RESPONSIVE */
.table-container{
overflow-x:auto;
width:100%;
}

table{
width:100%;
min-width:700px;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#f06292;
color:#fff;
}

/* LOADING SCREEN */
#loadingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.9);
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
color:#c2185b;
z-index:9999;
}

/* PRINT */
@media print{
button{display:none;}
body{background:#fff;}
#loadingScreen{display:none;}
}
</style>
</head>

<body>

<div id="loadingScreen">Please wait, loading data...</div>

<div class="container">

<h2>Rental Not Paid Chart & Percentage Reports</h2>

<div style="text-align:center;">
<button onclick="window.print()">Print A4</button>
<button onclick="exportExcel()">Export Excel</button>
</div>

<div class="row" id="topSummary"></div>

<div class="card">
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h3 style="text-align:center;color:#1976d2;">Month Wise Summary</h3>

<div class="table-container">
<table id="summaryTable">
<thead>
<tr>
<th>Month</th>
<th>Total Shops</th>
<th>Paid</th>
<th>Pending</th>
<th>Paid %</th>
<th>Pending %</th>
</tr>
</thead>
<tbody id="monthSummary"></tbody>
</table>
</div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyxlyK3FuJ7vpa3HFpuqCa_x_k0V6pO5-w828KmHielditmmkvg_C0jB83AsiVrnUhC/exec";

let tenants=[];
let payments=[];
let chart;

const monthNames=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

function findValue(obj,keys){
for(let k of keys){
if(obj[k]!==undefined && obj[k]!==null) return obj[k];
}
return "";
}

function isMonthPaid(shop,month,year){
return payments.some(p=>{
let s=findValue(p,["ShopNo","Shop_No","Shop No"]);
if(String(s).trim()!==String(shop).trim()) return false;

let months=findValue(p,["Months","Month"]);
if(!months) return false;

let arr=months.toString().toLowerCase().split(",").map(x=>x.trim());

let d=findValue(p,["PaymentDate","Date"]);
let y=d?new Date(d).getFullYear():new Date().getFullYear();

return arr.includes(month.toLowerCase()) && y===year;
});
}

async function loadData(){

document.getElementById("loadingScreen").style.display="flex";

try{

let t=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"getTenants"})
});
tenants=(await t.json()).data||[];

let p=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"getPayments"})
});
payments=(await p.json()).data||[];

renderDashboard();

}catch(err){
alert("Error loading data!");
console.error(err);
}

document.getElementById("loadingScreen").style.display="none";
}

function renderDashboard(){

let year=new Date().getFullYear();
let currentMonth=new Date().getMonth();

let totalShops=tenants.length;
let totalPaid=0;
let totalPending=0;
let uniquePending=new Set();
let currentMonthPending=0;

let labels=[];
let paidData=[];
let pendingData=[];

const tbody=document.getElementById("monthSummary");
tbody.innerHTML="";

for(let i=0;i<=currentMonth;i++){

let month=monthNames[i];
let paid=0;
let pending=0;

tenants.forEach(t=>{
let shop=findValue(t,["ShopNo","Shop_No","Shop No"]);

if(isMonthPaid(shop,month,year)){
paid++;
}else{
pending++;
uniquePending.add(shop);
if(i===currentMonth) currentMonthPending++;
}
});

totalPaid+=paid;
totalPending+=pending;

let paidPercent=((paid/totalShops)*100).toFixed(1);
let pendingPercent=((pending/totalShops)*100).toFixed(1);

tbody.innerHTML+=`
<tr>
<td>${month}-${year}</td>
<td>${totalShops}</td>
<td style="color:green;font-weight:bold;">${paid}</td>
<td style="color:red;font-weight:bold;">${pending}</td>
<td class="green">${paidPercent}%</td>
<td class="red">${pendingPercent}%</td>
</tr>`;

labels.push(month);
paidData.push(paid);
pendingData.push(pending);
}

document.getElementById("topSummary").innerHTML=`
<div class="summary blue">Total Shops<br>${totalShops}</div>
<div class="summary green">Total Paid Months<br>${totalPaid}</div>
<div class="summary red">Total Pending Months<br>${totalPending}</div>
<div class="summary red">Unique Pending Customers<br>${uniquePending.size}</div>
<div class="summary red">Current Month Pending<br>${currentMonthPending}</div>
`;

renderChart(labels,paidData,pendingData);
}

function renderChart(labels,paid,pending){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("barChart"),{
type:'bar',
data:{
labels:labels,
datasets:[
{label:'Paid',data:paid,backgroundColor:'green'},
{label:'Pending',data:pending,backgroundColor:'red'}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{position:'top'}}
}
});
}

function exportExcel(){
let table=document.getElementById("summaryTable").outerHTML;
let blob=new Blob([table],{type:"application/vnd.ms-excel"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="Rental_Report.xls";
a.click();
}

loadData();

</script>

</body>
</html>
