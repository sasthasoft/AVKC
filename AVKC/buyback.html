<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Amount Collection</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#f4f6f8}
header{
background:#c2185b;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
max-width:1100px;
margin:auto;
padding:12px;
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:15px;
border-top:4px solid #c2185b;
}

h3{
margin-bottom:10px;
color:#c2185b;
text-align:center;
}

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-bottom:10px;
}

label{
font-size:13px;
font-weight:bold;
margin-bottom:4px;
display:block;
}

input{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#c2185b;
color:#fff;
font-weight:bold;
cursor:pointer;
width:100%;
transition:.3s;
}

button:hover{opacity:.9}

button:disabled{
background:#999;
cursor:not-allowed;
}

.table-container{
width:100%;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:650px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
white-space:nowrap;
}

th{
background:#f06292;
color:#fff;
}

.loading{
text-align:center;
color:#c2185b;
font-weight:bold;
padding:10px;
}

#bill{display:none}

@media print{
body *{visibility:hidden}
#bill,#bill *{visibility:visible}
#bill{position:absolute;left:0;top:0;width:100%}
}
</style>
</head>

<body>

<header>Pending Amount Collection</header>

<div class="container">

<div class="card">
<h3>Pending Bill Search</h3>

<div class="row">
<div>
<label>Bill No</label>
<input id="searchBill">
</div>

<div>
<label>Mobile</label>
<input id="searchMobile">
</div>

<div style="align-self:end">
<button id="searchBtn" onclick="searchBill()">Search</button>
</div>
</div>

<div id="loadingMsg"></div>

<div class="table-container">
<table id="resultTable">
<thead></thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="card">
<h3>Collect Pending</h3>

<div id="selectedInfo" style="color:green;font-weight:bold;margin-bottom:10px"></div>

<div class="row">
<div>
<label>Now Paid</label>
<input id="nowPaid" readonly>
</div>

<div>
<label>Pending</label>
<input id="pendingAmt" readonly>
</div>

<div>
<label>Collection Amount</label>
<input id="collectAmt">
</div>
</div>

<button id="saveBtn" onclick="saveCollection()">Save & Print Receipt</button>
</div>

</div>

<div id="bill"></div>

<script>

const PAYMENT_URL = "https://script.google.com/macros/s/AKfycby9CRHPk0_yLdCb6lFCLsjLMTDEcLLFFOGJF2Wx0BW7wOhIKfcxBUGzgwRQ5OscPr4BDg/exec";

let selectedBill = null;

/* SEARCH BILL */
async function searchBill(){

try{

const billNo = document.getElementById("searchBill").value.trim();
const mobile = document.getElementById("searchMobile").value.trim();
const btn = document.getElementById("searchBtn");
const loading = document.getElementById("loadingMsg");

if(!billNo && !mobile){
alert("Enter Bill No or Mobile");
return;
}

btn.disabled = true;
btn.innerText = "Searching...";
loading.innerHTML = "<div class='loading'>Loading data...</div>";

const res = await fetch(PAYMENT_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({action:"getPayments"})
});

const result = await res.json();

btn.disabled = false;
btn.innerText = "Search";
loading.innerHTML = "";

const tableHead = document.querySelector("#resultTable thead");
const tableBody = document.querySelector("#resultTable tbody");

tableHead.innerHTML="";
tableBody.innerHTML="";

if(result.status !== "success"){
alert("Server Error");
return;
}

/* SEARCH IMPROVED (Bill OR Mobile OR Both) */
const filtered = result.data.filter(r => {

const matchesSearch =
(billNo && String(r.BillNo).includes(billNo)) ||
(mobile && String(r.mobile).includes(mobile));

const hasPending = Number(r.pending || 0) > 0;

return matchesSearch && hasPending;

});

if(filtered.length == 0){
alert("No Record Found");
return;
}

tableHead.innerHTML =
"<tr><th>Bill No</th><th>Name</th><th>Mobile</th><th>Now Paid</th><th>Pending</th><th>Select</th></tr>";

filtered.forEach(r=>{
tableBody.innerHTML+=`
<tr>
<td>${r.BillNo}</td>
<td>${r.tenantName}</td>
<td>${r.mobile}</td>
<td>₹${r.nowPaid}</td>
<td>₹${r.pending}</td>
<td><button onclick='selectBill(${JSON.stringify(r)})'>Select</button></td>
</tr>`;
});

}catch(err){
alert("Error: " + err.message);
}
}

/* SELECT BILL */
function selectBill(row){

selectedBill = row;

document.getElementById("selectedInfo").innerText =
"Selected Bill: "+row.BillNo+" | Name: "+row.tenantName;

document.getElementById("nowPaid").value = row.nowPaid;
document.getElementById("pendingAmt").value = row.pending;
document.getElementById("collectAmt").value = "";

window.scrollTo({top:500,behavior:"smooth"});
}

/* VALIDATE AMOUNT */
document.getElementById("collectAmt").addEventListener("input",function(){

if(!selectedBill) return;

const entered = Number(this.value||0);
const pending = Number(selectedBill.pending||0);

if(entered > pending){
alert("Amount exceeds pending!");
this.value="";
}
});

/* SAVE COLLECTION */
async function saveCollection(){

try{

if(!selectedBill){
alert("Select Bill First");
return;
}

const btn = document.getElementById("saveBtn");
btn.disabled = true;
btn.innerText = "Saving...";

const collectAmt = Number(document.getElementById("collectAmt").value||0);
const pending = Number(selectedBill.pending||0);

if(collectAmt <= 0 || collectAmt > pending){
alert("Invalid amount");
btn.disabled = false;
btn.innerText = "Save & Print Receipt";
return;
}

const res = await fetch(PAYMENT_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"collectPending",
billNo:selectedBill.BillNo,
collectAmount: collectAmt
})
});

const data = await res.json();

btn.disabled = false;
btn.innerText = "Save & Print Receipt";

if(data.status === "success"){

// ✅ Success Message
alert("✅ Payment Saved Successfully");

// ✅ Print
printReceipt(collectAmt, data.updatedPaid, data.updatedPending);

// ✅ Clear Selection
selectedBill = null;
document.getElementById("selectedInfo").innerText = "";
document.getElementById("nowPaid").value = "";
document.getElementById("pendingAmt").value = "";
document.getElementById("collectAmt").value = "";

// ✅ Auto Refresh Search Result
searchBill();

}else{
alert("Error: " + data.message);
}

}catch(err){
alert("Error: " + err.message);
}
}

/* PRINT RECEIPT */
function printReceipt(amount, updatedPaid, updatedPending){

const div = document.getElementById("bill");

div.innerHTML = `
<h2 style="text-align:center">Payment Receipt</h2>
<hr>
<p><b>Bill No:</b> ${selectedBill.BillNo}</p>
<p><b>Name:</b> ${selectedBill.tenantName}</p>
<p><b>Mobile:</b> ${selectedBill.mobile}</p>
<p><b>Collected Amount:</b> ₹${amount}</p>
<p><b>Total Paid:</b> ₹${updatedPaid}</p>
<p><b>Remaining Pending:</b> ₹${updatedPending}</p>
<br><br>
<p>Signature ____________________</p>
`;

window.print();
}

</script>

</body>
</html>
